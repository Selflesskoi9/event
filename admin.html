<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EventHub | Админ панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ========== HEADER ========== -->
    <header class="header">
        <div class="container">
            <div class="header__inner">
                <a href="index.html" class="logo">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Event<span class="logo__accent">Hub</span></span>
                </a>
                <nav class="nav">
                    <ul class="nav__list">
                        <li><a href="index.html" class="nav__link">На сайт</a></li>
                        <li><a href="#" onclick="exportToExcel()" class="nav__link"><i class="fas fa-download"></i> Export Excel</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="admin-header">
                <h1><i class="fas fa-chart-line"></i> Админ панель</h1>
                <p>Статистика регистраций на мероприятия</p>
            </div>

            <div class="stats-cards" id="statsCards">
                <!-- Статистика загрузится через JS -->
            </div>

            <div class="admin-controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск по имени, email или событию...">
                </div>
                <button class="btn btn--outline" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> Обновить
                </button>
            </div>

            <div class="registrations-table">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Имя</th>
                                <th>Email</th>
                                <th>Телефон</th>
                                <th>Событие</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="registrationsTableBody">
                            <tr><td colspan="6" class="loading">Загрузка...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="pagination" class="pagination"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__content">
                <div class="footer__brand">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Event<span>Hub</span></span>
                    <p>Администрирование системы регистрации</p>
                </div>
                <div class="footer__bottom">
                    <p>© 2026 EventHub. Административная панель</p>
                </div>
            </div>
        </div>
    </footer>

    <div id="deleteModal" class="modal">
        <div class="modal__content modal__content--small">
            <h3>Удалить регистрацию?</h3>
            <p>Вы уверены, что хотите удалить эту регистрацию?</p>
            <div class="modal__actions">
                <button class="btn btn--outline" onclick="closeModal('deleteModal')">Отмена</button>
                <button class="btn btn--danger" id="confirmDeleteBtn">Удалить</button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
